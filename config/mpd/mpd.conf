# Directories
music_directory     "~/Music"
playlist_directory  "~/.config/mpd/playlists"
db_file             "~/.local/share/mpd/database"
log_file            "~/.local/share/mpd/log"
state_file          "~/.local/share/mpd/state"

# Network
bind_to_address     "127.0.0.1"
port                "6600"

# Audio (PipeWire)
audio_output {
    type "pipewire"
    name "PipeWire Output"
}
